zhipu-openrouter:
  api_key_env_var: "ZHIPU_API_KEY_OPENROUTER"
  api_base_url: *openrouter_endpoint
  temperature: 0.6
  # OpenRouter currently reports z-ai/glm-4.7 max_completion_tokens=131072.
  # Keep this shared default below that limit to leave input context headroom
  # across GLM variants while still allowing long-form outputs.
  max_tokens: 65536
  max_tokens_retry:
    status_code: 404
    body_contains: "no allowed providers"
    max_tokens_limit: 8192
  context_window: 202752  # OpenRouter z-ai routes report 202752, not 200000
  pricing_currency: "$"
  # OpenRouter official routing controls (pin to Z.AI route; no fallbacks)
  request_overrides:
    provider:
      only: ["z-ai"]
      allow_fallbacks: false
  models:
    glm-5.2-or:
      id: "z-ai/glm-5.2"
      pricing: {input: 1.05, output: 3.50}
      capabilities:
        version: "openrouter-z-ai-glm-5.2-2026-07-02"
        source: "https://openrouter.ai/api/v1/models"
        source_date: "2026-07-02"
        strict_response_schema: true
        json_object_response: true
        tools: true
        tool_streaming: true
        tool_choice: true
        parallel_tool_calls: true
        reasoning_controls: ["reasoning", "include_reasoning", "reasoning_effort"]
        openrouter_supported_parameters:
          - response_format
          - structured_outputs
          - tools
          - tool_choice
          - parallel_tool_calls
          - max_tokens
          - temperature
          - reasoning
          - include_reasoning
          - reasoning_effort
    glm-4.5-or:
