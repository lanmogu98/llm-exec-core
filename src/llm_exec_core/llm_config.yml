# |
#   This is the single source of truth for all LLM configuration.
#   The structure is: provider -> provider_settings -> model_name -> model_details
#   Users can add new models to the config file in the format demonstrated below.
#    - provider: the name of the LLM provider.
#    - provider_settings: the settings of the LLM provider.
#    - model_name: the name of the LLM model.
#    - model_details: the details of the LLM model.
#    - pricing: the pricing of the LLM model, per 1M tokens.
#    - pricing_currency: the currency of the pricing.
#    - max_tokens: the maximum number of tokens the model can generate.
#    - context_window: the maximum number of tokens the model can process.
#    - rate_limit (optional): per-provider rate limiting configuration
#        - min_interval_seconds: minimum time between requests (default: 0.5)
#        - max_requests_per_minute: max requests per minute, 0 = unlimited (default: 60)
#
#   In default, and as a highly recommend practice, the API key of each model is
#   stored in the environment variable.

#-------------------------------------------------------------------------------
# Shared endpoints for reuse across providers
#-------------------------------------------------------------------------------
_shared_endpoints:
  volcengine: &volcengine_endpoint "https://ark.cn-beijing.volces.com/api/v3/chat/completions"
  openrouter: &openrouter_endpoint "https://openrouter.ai/api/v1/chat/completions"


deepseek-volcengine:
  api_key_env_var: "DEEPSEEK_API_KEY_VOLC"
  api_base_url: *volcengine_endpoint
  temperature: 0.4
  max_tokens: 16000
  context_window: 128000
  pricing_currency: "¥"
  models:
    deepseek-v3.2:
      id: "deepseek-v3-2-251201"
      pricing: { input: 2.00, output: 8.00 }
      capabilities:
        version: "deepseek-volcengine-2026-07-02"
        source: "https://www.volcengine.com/docs/82379/1330310"
        source_date: "2026-07-02"
        strict_response_schema: false
        json_object_response: true
        tools: true
        tool_streaming: true
        tool_choice: true
        reasoning_controls: ["thinking", "reasoning_effort"]
    deepseek-r1:
      id: "deepseek-r1-250528"
      pricing: { input: 4.00, output: 16.00 }
      capabilities:
        version: "deepseek-volcengine-2026-07-02"
        source: "https://www.volcengine.com/docs/82379/1330310"
        source_date: "2026-07-02"
        strict_response_schema: false
        json_object_response: true
        tools: true
        tool_streaming: true
        tool_choice: true
        reasoning_controls: ["thinking", "reasoning_effort"]

# DeepSeek official API. V4 and V4-Pro are exclusive to this endpoint (not on Volcengine).
# Block defaults match V3.2 / R1 limits; V4 family is capped here pending #21
# (per-model max_tokens / context_window override).
# Model IDs sourced from api-docs.deepseek.com/quick_start/pricing (May 2026).
# Recommend a live curl test before first production use — research was based on
# search snippets, not direct page render. Aliases `deepseek-chat` and
# `deepseek-reasoner` retire 2026-07-24.
deepseek:
  api_key_env_var: "DEEPSEEK_API_KEY"
  api_base_url: "https://api.deepseek.com/chat/completions"
  temperature: 0.4
  max_tokens: 64000  # V3.2/R1 max output; V4-Flash/V4-Pro support 384K (capped here)
  context_window: 128000  # V3.2/R1 context; V4-Flash/V4-Pro support 1M (capped here)
  pricing_currency: "$"
  # Live test (2026-05-09) confirmed: official API rejects versioned IDs
  # (deepseek-v3.2, deepseek-r1) with "supported API model names are
  # deepseek-v4-pro or deepseek-v4-flash". V3.2 and R1 are Volcengine-only now.
  models:
    deepseek-v4-flash:
      id: "deepseek-v4-flash"
      pricing: { input: 0.14, output: 0.28 }
      capabilities:
        version: "deepseek-official-2026-07-02"
        source: "https://api-docs.deepseek.com/api/create-chat-completion"
        source_date: "2026-07-02"
        strict_response_schema: false
        json_object_response: true
        tools: true
        tool_streaming: true
        tool_choice: true
        reasoning_controls: ["thinking", "reasoning_effort"]
    # V4-Pro is on a 75% promo through 2026-05-31; standard rates resume after.
    # Standard: input $1.74 / output $3.48
    deepseek-v4-pro:
      id: "deepseek-v4-pro"
      pricing: { input: 0.435, output: 0.87 }
      capabilities:
        version: "deepseek-official-2026-07-02"
        source: "https://api-docs.deepseek.com/api/create-chat-completion"
        source_date: "2026-07-02"
        strict_response_schema: false
        json_object_response: true
        tools: true
        tool_streaming: true
        tool_choice: true
        reasoning_controls: ["thinking", "reasoning_effort"]

gemini:
  api_key_env_var: "GEMINI_API_KEY"
  api_base_url: "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"
  temperature: 1.0  # Gemini 3 recommends default 1.0 to avoid looping issues
  max_tokens: 65536
  context_window: 1000000  # Gemini 3 supports 1M token input
  pricing_currency: "$"
  # Gemini 3 thinking configuration via OpenAI compatibility layer
  # If not set, model uses dynamic thinking (defaults to "high" with auto-adjustment)
  # Use CLI --thinking to override: low | medium | high | minimal
  # See: https://ai.google.dev/gemini-api/docs/gemini-3
  # request_overrides:
  #   reasoning_effort: "high"  # Uncomment to force specific level
  models:
    gemini-3-flash:
      id: "gemini-3-flash-preview"
      pricing: { input: 0.5, output: 3.00 }
      capabilities:
        version: "gemini-openai-compat-2026-07-02"
        source: "https://ai.google.dev/gemini-api/docs/openai"
        source_date: "2026-07-02"
        strict_response_schema: true
        json_object_response: true
        tools: true
        tool_streaming: true
        tool_choice: true
        reasoning_controls: ["reasoning_effort"]
    gemini-3.1-flash-lite:
      id: "gemini-3.1-flash-lite-preview"
      pricing: { input: 0.25, output: 1.50 }
      capabilities:
        version: "gemini-openai-compat-2026-07-02"
        source: "https://ai.google.dev/gemini-api/docs/openai"
        source_date: "2026-07-02"
        strict_response_schema: true
        json_object_response: true
        tools: true
        tool_streaming: true
        tool_choice: true
        reasoning_controls: ["reasoning_effort"]
    gemini-3.1-pro:
      id: "gemini-3.1-pro-preview"
      pricing: { input: 2.50, output: 15.00 }

# Gemini Free Tier - uses separate API key with stricter rate limits.
# Provider-wide rate_limit applies to ALL models in this block; we use the most
# restrictive cap (10 RPM) to avoid throttling violations on any free-tier model.
# Verified per ai.google.dev/gemini-api/docs/pricing (May 2026 — free tier was
# tightened 2026-04-01: Pro models moved to paid; Flash retained at reduced RPD):
#   gemini-2.5-flash:               10 RPM, 250K TPM
#   gemini-2.5-flash-lite:          15 RPM, 250K TPM
#   gemini-3-flash-preview:         10 RPM (lowest published flash cap)
#   gemini-3.1-flash-lite-preview:  free, RPM unpublished — fall back to 10
# Note: Free tier does NOT support gemini-3-pro / gemini-3.1-pro (paid only).
# Exact per-project RPD/TPM is shown in AI Studio dashboard, not this comment.
gemini-free:
  api_key_env_var: "GEMINI_FT_API_KEY"
  api_base_url: "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"
  temperature: 1.0
  max_tokens: 65536
  context_window: 1000000  # 1M context
  pricing_currency: "$"
  rate_limit:
    min_interval_seconds: 6.0  # 10 RPM = 60s / 10
    max_requests_per_minute: 10
  models:
    gemini-2.5-flash-free:
      id: "gemini-2.5-flash"
      pricing: { input: 0.0, output: 0.0 }
    gemini-2.5-flash-lite-free:
      id: "gemini-2.5-flash-lite"
      pricing: { input: 0.0, output: 0.0 }
    gemini-3-flash-free:
      id: "gemini-3-flash-preview"
      pricing: { input: 0.0, output: 0.0 }
    gemini-3.1-flash-lite-free:
      id: "gemini-3.1-flash-lite-preview"
      pricing: { input: 0.0, output: 0.0 }

